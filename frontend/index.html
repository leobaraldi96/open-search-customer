<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca Clientes - CRM Orquestador</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts for modern typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="glass-header">
            <div class="logo">
                <h1>Busca<span>Clientes</span></h1>
            </div>
            <nav>
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    Worker Node: <span class="text-neon-green">Esperando</span>
                </div>
            </nav>
        </header>

        <main class="dashboard-grid">
            <!-- KPIs Header (v5.0.0) -->
            <section class="metrics-grid" id="metricsDashboard">
                <div class="metric-card">
                    <span class="metric-label">Total Leads</span>
                    <span class="metric-value" id="statsTotal">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Contactados</span>
                    <span class="metric-value" style="color: var(--accent-indigo);" id="statsContactados">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Respuestas</span>
                    <span class="metric-value" style="color: var(--accent-amber);" id="statsRespondidos">0</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Conversión</span>
                    <span class="metric-value" style="color: var(--accent-emerald);" id="statsConversion">0%</span>
                </div>
            </section>

            <!-- Sidebar for Controls -->
            <aside class="glass-panel controls-panel">
                <h2 style="font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--accent-indigo);">Prospección
                    Estratégica</h2>
                <form id="prospectForm">
                    <div class="input-group">
                        <label for="maps-link" style="color: var(--accent-indigo);">🪄 Importación Inteligente</label>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="maps-link" placeholder="Pegar link de Google Maps..."
                                style="flex:1;" />
                            <button type="button" id="magic-btn" class="magic-btn"
                                title="Extraer datos mágicamente">✨</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="empresa">Nombre Empresa</label>
                        <input type="text" id="empresa" required placeholder="Ej: Tech Group SA" />
                    </div>
                    <div class="input-group">
                        <label for="url">URL Web</label>
                        <input type="url" id="url" placeholder="https://..." />
                    </div>
                    <div class="input-group">
                        <label for="telefonoInput">Teléfono</label>
                        <input type="text" id="telefonoInput" placeholder="Ej: +54 9 11..." />
                    </div>
                    <div class="input-group">
                        <label for="direccionInput">Dirección</label>
                        <input type="text" id="direccionInput" placeholder="Ej: Av. Colón 123..." />
                    </div>
                    <div class="input-group">
                        <label for="emailInput">Email de Contacto</label>
                        <input type="email" id="emailInput" placeholder="ejemplo@correo.com" />
                    </div>
                    <button type="submit" class="premium-btn">AÑADIR A LA RED</button>
                    <div style="margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted); text-align: center;">
                        <span style="color: var(--accent-emerald);">●</span> Motor de IA Baraldi v5.2 Online
                    </div>
                </form>
            </aside>

            <!-- Main CRM Table -->
            <section class="glass-panel crm-panel">
                <div class="crm-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="font-size: 1.1rem;">CRM de Prospección</h2>
                    <span class="badge" id="leadCount"
                        style="background: var(--bg-deep); padding: 4px 12px; border-radius: 20px; font-size: 0.875rem; font-weight: 800; border: 1px solid var(--glass-border);">0
                        leads</span>
                </div>
                <div class="table-container">
                    <table id="leadsTable">
                        <thead>
                            <tr>
                                <th>Empresa / Contacto</th>
                                <th>Dominio</th>
                                <th>Riesgo Detectado</th>
                                <th>Estado</th>
                                <th>Gestión</th>
                            </tr>
                        </thead>
                        <tbody id="leadsBody">
                            <!-- JS populate -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- Modal de Informe Detallado -->
        <div id="reportModal" class="modal-overlay">
            <!-- JS Inject: Matrix of Evidence -->
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
